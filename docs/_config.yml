theme: jekyll-theme-cayman
title: AIHotNews
description: 每日 AI 前沿资讯 · AI-curated daily digest
baseurl: "/ai-consulting"
url: "https://konglp1997.github.io"

# Build settings
markdown: kramdown
future: true
plugins:
  - jekyll-feed
feed:
  path: feed.xml
exclude:
  - ".github"
  - "node_modules"

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "default"
